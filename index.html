<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Quiz - Realtime Assessment</title>
  <!-- Tailwind CSS CDN for utility spacing/layout (optional fallback) -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <!-- Supabase CDN - LOAD FIRST BEFORE supabase.js -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="flex items-center justify-center p-4 min-h-screen">

  <div class="w-full max-w-md glass-panel p-8 text-center pulse-element">
    <h1 class="text-3xl font-extrabold mb-2 text-gradient">QUIZ PLATFORM</h1>
    <p class="text-muted mb-8 text-sm">Real-time assessment, grading, and reporting system</p>

    <!-- CLIENT JOIN FORM -->
    <div id="join-form-section">
      <h3 class="text-lg font-semibold mb-4 text-left">Gabung Sebagai Peserta</h3>
      <div class="flex flex-col gap-4 text-left">
        <div>
          <label class="text-xs text-gray-400 font-bold">KODE RUANG (ROOM CODE)</label>
          <input type="text" id="join-room-code" class="input-field mt-1 uppercase" placeholder="ABC123" maxlength="10">
        </div>
        <div>
          <label class="text-xs text-gray-400 font-bold">NAMA LENGKAP</label>
          <input type="text" id="join-name" class="input-field mt-1" placeholder="Masukkan nama Anda...">
        </div>
        <button id="btn-join-room" class="btn btn-primary w-full mt-2">Gabung Kuis</button>
      </div>
    </div>

    <!-- DIVIDER -->
    <div class="relative my-8">
      <hr style="border-color: var(--border-glass);">
      <span class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 px-3 bg-gray-900 text-xs text-gray-400">ATAU</span>
    </div>

    <!-- HOST/ADMIN LOGIN BUTTON -->
    <button id="btn-show-login" class="btn btn-secondary w-full">Masuk Sebagai Host / Admin</button>

    <div class="mt-8 text-xs text-gray-500">
      &copy; 2026 Assessment System. All rights reserved.
    </div>
  </div>

  <!-- LOGIN & REGISTER MODAL -->
  <div id="login-modal" class="fixed inset-0 bg-black bg-opacity-70 backdrop-filter backdrop-blur-md hidden flex items-center justify-center z-50">
    <div class="w-full max-w-sm glass-panel p-8">
      
      <!-- Login Section -->
      <div id="login-section">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-xl font-bold text-gradient">Login Portal</h2>
          <button id="btn-close-login" class="text-gray-400 hover:text-white" style="font-size: 1.5rem; line-height: 1;">&times;</button>
        </div>
        
        <form id="form-login" class="flex flex-col gap-4">
          <div>
            <label class="text-xs text-gray-400 font-bold">USERNAME</label>
            <input type="text" id="login-username" class="input-field mt-1" placeholder="Username" required>
          </div>
          <div>
            <label class="text-xs text-gray-400 font-bold">PASSWORD</label>
            <input type="password" id="login-password" class="input-field mt-1" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary w-full mt-2">Masuk</button>
        </form>
        <p class="text-xs text-center text-gray-400 mt-4">
          Belum punya akun? <a href="#" id="link-show-register" class="text-indigo-400 font-bold hover:underline">Daftar Akun Baru</a>
        </p>
      </div>

      <!-- Register Section -->
      <div id="register-section" class="hidden">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-xl font-bold text-gradient">Daftar Host / Admin</h2>
          <button id="btn-close-register" class="text-gray-400 hover:text-white" style="font-size: 1.5rem; line-height: 1;">&times;</button>
        </div>
        
        <form id="form-register" class="flex flex-col gap-4">
          <div>
            <label class="text-xs text-gray-400 font-bold">USERNAME</label>
            <input type="text" id="register-username" class="input-field mt-1" placeholder="Username baru" required>
          </div>
          <div>
            <label class="text-xs text-gray-400 font-bold">PASSWORD</label>
            <input type="password" id="register-password" class="input-field mt-1" placeholder="••••••••" required>
          </div>
          <div>
            <label class="text-xs text-gray-400 font-bold">DAFTAR SEBAGAI</label>
            <select id="register-role" class="input-field mt-1" style="background-color: #0f172a;">
              <option value="Host" selected>Host (Pembuat Kuis)</option>
              <option value="Admin">Admin (Manajemen User)</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary w-full mt-2">Daftar Sekarang</button>
        </form>
        <p class="text-xs text-center text-gray-400 mt-4">
          Sudah punya akun? <a href="#" id="link-show-login" class="text-indigo-400 font-bold hover:underline">Log In</a>
        </p>
      </div>

    </div>
  </div>

  <!-- Scripts - Supabase library MUST load before supabase.js -->
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const loginModal = document.getElementById('login-modal');
    const loginSection = document.getElementById('login-section');
    const registerSection = document.getElementById('register-section');

    // Show/Hide Modal triggers
    document.getElementById('btn-show-login').addEventListener('click', () => {
      loginModal.classList.remove('hidden');
      showLoginView();
    });
    
    document.getElementById('btn-close-login').addEventListener('click', () => {
      loginModal.classList.add('hidden');
    });
    document.getElementById('btn-close-register').addEventListener('click', () => {
      loginModal.classList.add('hidden');
    });

    // View switcher toggles
    document.getElementById('link-show-register').addEventListener('click', (e) => {
      e.preventDefault();
      showRegisterView();
    });
    document.getElementById('link-show-login').addEventListener('click', (e) => {
      e.preventDefault();
      showLoginView();
    });

    function showLoginView() {
      loginSection.classList.remove('hidden');
      registerSection.classList.add('hidden');
    }
    function showRegisterView() {
      loginSection.classList.add('hidden');
      registerSection.classList.remove('hidden');
    }

    // Handle Login
    document.getElementById('form-login').addEventListener('submit', async (e) => {
      e.preventDefault();
      const userVal = document.getElementById('login-username').value.trim();
      const passVal = document.getElementById('login-password').value;

      try {
        const user = await window.Auth.login(userVal, passVal);
        if (user.role === 'Admin') {
          window.location.href = 'admin.html';
        } else if (user.role === 'Host') {
          window.location.href = 'host.html';
        }
      } catch (err) {
        alert(err.message);
      }
    });

    // Handle Registration (Daftar Akun Baru)
    document.getElementById('form-register').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('register-username').value.trim();
      const password = document.getElementById('register-password').value;
      const role = document.getElementById('register-role').value;

      try {
        const { data, error } = await window.supabaseClient
          .from('user_roles')
          .insert([{ username, password, role }])
          .select();

        if (error) {
          throw new Error("Pendaftaran gagal: " + error.message);
        }

        alert("Akun berhasil didaftarkan! Silakan log in.");
        showLoginView();
        document.getElementById('login-username').value = username;
        document.getElementById('login-password').value = password;
      } catch (err) {
        alert(err.message);
      }
    });

    // Handle Client Join Room
    document.getElementById('btn-join-room').addEventListener('click', async () => {
      const roomCode = document.getElementById('join-room-code').value.trim().toUpperCase();
      const name = document.getElementById('join-name').value.trim();

      if (!roomCode || !name) {
        alert('Mohon masukkan Kode Room dan Nama Anda!');
        return;
      }

      // Check if room exists and is scheduled or waiting
      try {
        const { data: room, error } = await window.supabaseClient
          .from('quiz_rooms')
          .select('*')
          .eq('room_code', roomCode)
          .single();

        if (error || !room) {
          alert('Kode Room tidak ditemukan!');
          return;
        }

        if (room.status === 'Finished') {
          alert('Kuis di room ini sudah selesai!');
          return;
        }

        // Save selection to localStorage and redirect to client.html
        localStorage.setItem('client_room_code', roomCode);
        localStorage.setItem('client_room_id', room.id);
        localStorage.setItem('client_participant_name', name);
        
        window.location.href = 'client.html';
      } catch (err) {
        alert('Terjadi kesalahan saat mencari Room: ' + err.message);
      }
    });
  </script>
</body>
</html>
